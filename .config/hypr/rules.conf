##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Float rules
windowrulev2 = noborder 1,fullscreen:1
windowrulev2 = float, class:^([Yy]ad)$
windowrulev2 = size 800 600, class:^([Yy]ad)$
windowrulev2 = float, class:^(pinentry-gtk)$
windowrulev2 = float, class:^(org.freedesktop.impl.portal.desktop.gtk)$
windowrulev2 = center, class:^(org.freedesktop.impl.portal.desktop.gtk)$
windowrulev2 = size 50% 60%, class:^(org.freedesktop.impl.portal.desktop.gtk)$

# Workspace rules
windowrulev2 = workspace 2, class:^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr)$
windowrulev2 = workspace 2, class:^(zen)$
windowrulev2 = workspace 4 silent, class:^([Dd]iscord)$
windowrulev2 = workspace 6, class:^([Ss]potify)$
windowrulev2 = workspace 1, class:^(dev.zed.Zed)$
windowrulev2 = workspace 5 silent, class:^([Ss]team)$
windowrulev2 = workspace 7 silent, class:^(KeePassXC)$
windowrulev2 = workspace 3, class:^(waybar-btop)$
