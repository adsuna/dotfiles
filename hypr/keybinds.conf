###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Function binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, kill -9 $(hyprctl activewindow | grep pid | tail -1 | awk '{print$2}')
bind = $mainMod Shift, P, exec, wlogout
bind = $mainMod, Space, togglefloating,
bind = $mainMod, F, fullscreen
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/gamemode.sh
bind = $mainMod, C, exec, zeditor ~/.config


# Wallpaper Select
bind = $mainMod, T, exec, $HOME/.config/hypr/scripts/selectwallpaper.sh
# Launch apps
bind = $mainMod, W, exec, firefox
bind = $mainMod Alt, W, exec,  firefox -p alt
bind = $mainMod Shift, W, exec, firefox --private-window
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager

# Hyprlock
bind = $mainMod, L, exec, hyprlock

# Screenshot a region
bind = $mainMod Shift, S, exec, hyprshot -zm region

# Power profile selector
bind = $mainMod, P, exec, ~/.config/hypr/scripts/rofi-quick-actions.sh -theme ~/.config/rofi/themes/sidebar.rasi

# Alt + Tab
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
bind = ALT SHIFT, Tab, cyclenext, prev
bind = super, tab, exec, hyprswitch gui --mod-key super_l --key tab


# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10



# Example special workspace (scratchpad)
bind = $mainMod, R, togglespecialworkspace, magic
bind = $mainMod SHIFT, R, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ & notify-send -r 91190 "Volume: $(pactl get-sink-volume @DEFAULT_SINK@ | awk '{print $5}' | sed 's/%//')%"
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- & notify-send -r 91190 "Volume: $(pactl get-sink-volume @DEFAULT_SINK@ | awk '{print $5}' | sed 's/%//')%"
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle & notify-send -r 91190 "Toggled Mute"
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle & notify-send -r 91190 "Toggled Mic Mute"
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+ & notify-send -r 91190 "Brightness: $(brightnessctl info | grep -oP '(?<=\()\d+(?=%)')%"
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%- & notify-send -r 91190 "Brightness: $(brightnessctl info | grep -oP '(?<=\()\d+(?=%)')%"


# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
